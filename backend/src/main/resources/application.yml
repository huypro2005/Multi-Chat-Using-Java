spring:
  application:
    name: chat-app-backend

  servlet:
    multipart:
      # File upload limits (W6-D1). Service cũng double-check 20MB ở FileValidationService
      # để defense-in-depth nếu config misconfigured.
      max-file-size: 20MB
      max-request-size: 21MB
      # enabled mặc định true — không cần khai báo lại

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chatapp}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 3
          max-wait: 2000ms

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:changeme-this-is-a-very-long-secret-key-for-dev-only-at-least-256-bits}
    access-expiration-ms: ${JWT_ACCESS_EXP:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXP:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  websocket:
    # Origin patterns cho STOMP/SockJS handshake. KHÔNG để "*" ở production.
    allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  file-cleanup:
    enabled: ${FILE_CLEANUP_ENABLED:true}
    # Expired cleanup: chạy 3:00 AM mỗi ngày (UTC).
    expired-cron: ${FILE_CLEANUP_EXPIRED_CRON:0 0 3 * * *}
    # Orphan cleanup: chạy đầu mỗi giờ.
    orphan-cron: ${FILE_CLEANUP_ORPHAN_CRON:0 0 * * * *}

# W6-D1 — File storage config. V1 dùng local disk; V2 migrate S3 (ADR-019).
storage:
  local:
    # Base path cho upload files. Default tương đối so với working dir (./uploads).
    # Production nên set absolute path qua env STORAGE_LOCAL_BASE_PATH.
    base-path: ${STORAGE_LOCAL_BASE_PATH:./uploads}

logging:
  level:
    root: INFO
    com.chatapp: DEBUG
    org.springframework.security: INFO