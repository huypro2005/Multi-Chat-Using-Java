# Test profile — override main application.yml
# DB và Redis sẽ dùng H2 in-memory hoặc mock; jwt/cors dùng test values

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: changeme-this-is-a-very-long-secret-key-for-dev-only-at-least-256-bits
    access-expiration-ms: 3600000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  websocket:
    allowed-origins: http://localhost:3000,http://localhost:5173

# W6-D1 — test-only storage path (relative, cleanup tự nhiên khi test suite kết thúc).
storage:
  local:
    base-path: ./build/test-uploads

logging:
  level:
    root: WARN
    com.chatapp: DEBUG
    org.springframework.security: WARN
